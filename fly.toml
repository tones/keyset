app = 'keyset-app'
primary_region = 'sjc'

[build]

[env]
  DATABASE_URL = 'file:/data/keyset.db'
  NODE_ENV = 'production'

[mounts]
  source = 'keyset_data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
